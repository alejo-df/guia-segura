{% extends "users/base.html" %}
{% block content %}
<div class="container my-4 my-lg-5">
    <div class="page-hero">
        <h1 class="fw-bold mb-2"><i class="fas fa-user-edit me-2"></i>Editar Usuario</h1>
        <p>Actualiza la información del usuario seleccionado. La contraseña es opcional.</p>
    </div>

    <div class="profile-card p-4 p-lg-5">
        <form method="POST" novalidate>
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label required-label" for="idInput">ID de usuario</label>
                    <input id="idInput" type="number" min="1" step="1" class="form-control" name="id" value="{{ usuario.id }}" required>
                    <div class="form-text">Al cambiarlo, también se actualizan las consultas y registros asociados a este usuario.</div>
                </div>
                <div class="col-md-4">
                    <label class="form-label required-label" for="usernameInput">Usuario</label>
                    <input id="usernameInput" class="form-control" name="username" value="{{ usuario.username }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="emailInput">Correo electrónico</label>
                    <input id="emailInput" type="email" class="form-control" name="email" value="{{ usuario.email }}" placeholder="correo@ejemplo.com">
                </div>
                <div class="col-12">
                    <label class="form-label" for="passwordInput">Nueva contraseña</label>
                    <input id="passwordInput" type="password" class="form-control" name="password" placeholder="Nueva contraseña (opcional)">
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2 justify-content-end mt-4">
                <a href="{% url 'panel_usuarios' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Volver</a>
                <button class="btn btn-primary"><i class="fas fa-save"></i> Guardar cambios</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
